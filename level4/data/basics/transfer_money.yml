flows:
  transfer_money:
    name: transfer money
    # Keep this flow in the command-generator prompt whenever the guard passes (small bot: few flows).
    always_include_in_prompt: true
    if: true
    description: |
      Transfer money in USD. Steps: get dollar amount, then who receives it (any name or text), then which account to take it from, then run the transfer action.
    steps:
      - collect: amount
        description: |
          US dollar amount. Parse the user's message and set slot amount to the main number as text (e.g. 20 from "20 dollars").
      - collect: recipient
        description: |
          Payee: any free-text string (letters, digits, spaces, punctuation). Set slot recipient to the user's
          entire last message, maximum 100 characters (truncate longer input). Preserve spacing and casing.
          Examples: "MC hammer", "Eliot Smith", "JFK". Use FillSlotCommand for slot recipient; do not use cannot_handle for valid short text.
      - collect: account_from
        description: |
          Source account. Set slot account_from to the user's full message (plain text), up to 120 characters.
      - action: action_process_transfer
