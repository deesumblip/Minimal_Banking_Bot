# Picks up where Level 3 ends: account collection, hour and balance actions, and the same responses you already use.
# This level adds transfer-related slots, actions, and flows.

version: "3.1"

slots:
  account:
    type: text

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

actions:
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
