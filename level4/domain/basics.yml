## Level 4 starter: Chapter 1.3 completion (same agent as finished `level3/`)
#
# This file matches the end of Chapter 1.3: `account` slot, `utter_ask_account`, Level 1–2–3
# actions and responses. No transfer fields yet.
#
# Chapter 1.4 labs add (in order): Lab 0.1 pipeline → Lab 2.1 domain (amount, recipient,
# account_from + utter_ask_* + action_process_transfer) → Lab 3.1 action → Lab 4.1 flow.

version: "3.1"

slots:
  account:
    type: text

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

actions:
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
