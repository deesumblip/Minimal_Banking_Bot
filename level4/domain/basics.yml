## Level 4: Multiple Slots — domain (Chapter 1.3 baseline + transfer)
#
# Chapter 1.3: account slot, check_balance, holiday_hours, bank hours.
# Chapter 1.4: transfer slots, action_process_transfer, data/basics/transfer_money.yml.

version: "3.1"

slots:
  account:
    type: text
  amount:
    type: text
  recipient:
    type: text
  account_from:
    type: text

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

  utter_ask_amount:
    - text: "How much would you like to transfer?"
      metadata:
        rephrase: False

  utter_ask_recipient:
    - text: "Who would you like to transfer money to?"
      metadata:
        rephrase: False

  utter_ask_account_from:
    - text: "Which account would you like to transfer from?"
      metadata:
        rephrase: False

actions:
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
  - action_process_transfer
