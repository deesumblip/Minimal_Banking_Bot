# Publishes Level 1 content and bot code to the Level 1 Codio assignment.
#
# Codio's yaml_map requires ONE entry per [Chapter, Section] pair
# (see https://docs.codio.com/develop/develop/ide/tools/ghapi.html),
# so we list every Unit in Level 1 explicitly. `paths:` is shared across
# entries via a YAML anchor (&level1-paths / *level1-paths).

- assignment: ce3030d4a593a5a999172fae3be31ff1
  section: ["Level 1 - Just Responses", "Unit 0: Prerequisites and Setup"]
  paths: &level1-paths
    # Level 1 bot code
    - "level1/**"
    # Level 1 guide content + top-level guide navigation
    - ".guides/content/index.json"
    - ".guides/content/Level-1---Just-Responses-d3b4/**"
    # All assessments (Codio renders only those referenced by included pages)
    - ".guides/assessments/**"
    # Level 1 graders
    - ".guides/secure/level1_graders/**"
    # Shared guide scripts and startup hooks
    - ".guides/scripts/**"
    - ".guides/startup.sh"
    # Shared box configuration
    - ".codio"
    - ".gitignore"

- assignment: ce3030d4a593a5a999172fae3be31ff1
  section: ["Level 1 - Just Responses", "Unit 1: Introduction to Rasa Agents"]
  paths: *level1-paths

