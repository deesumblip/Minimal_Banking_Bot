- assignment: 0ef39b54b918ebe3c5c783193f91fb99
  section: ["Level 2 - Custom Actions", "Unit 5: Using Actions in Flows"]
  paths: *level2-paths

- assignment: 0ef39b54b918ebe3c5c783193f91fb99
  section: ["Level 2 - Custom Actions", "Unit 6: Training, Testing, and Level 2 Wrap-Up"]
  paths: *level2-paths
