# Publishes Level 2 content and bot code to the Level 2 Codio assignment.
#
# Codio's yaml_map requires ONE entry per [Chapter, Section] pair
# (see https://docs.codio.com/develop/develop/ide/tools/ghapi.html),
# so we list every Unit in Level 2 explicitly. `paths:` is shared across
# entries via a YAML anchor (&level2-paths / *level2-paths).

- assignment: 0ef39b54b918ebe3c5c783193f91fb99
  section: ["Level 2 - Custom Actions", "Unit 0: Recap - What you built in Level 1"]
  paths: &level2-paths
    # Level 2 bot code (includes the actions/ module for custom actions)
    - "level2/**"
    # Level 2 guide content + top-level guide navigation
    - ".guides/content/index.json"
    - ".guides/content/Level-2---Custom-Actions-30d6/**"
    # All assessments (Codio renders only those referenced by included pages)
    - ".guides/assessments/**"
    # Level 2 graders
    - ".guides/secure/level2_graders/**"
    # Shared guide scripts and startup hooks
    - ".guides/scripts/**"
    - ".guides/startup.sh"
    # Shared box configuration
    - ".codio"
    - ".gitignore"

- assignment: 0ef39b54b918ebe3c5c783193f91fb99
  section: ["Level 2 - Custom Actions", "Unit 1: Introduction to Actions"]
  paths: *level2-paths

- assignment: 0ef39b54b918ebe3c5c783193f91fb99
