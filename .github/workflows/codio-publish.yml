# Publish this repo to the Codio course on every push to main.
#
# Publishes the whole-course Codio assignment on every push to main.
#
# Level-subset assignments (Level 1, Level 2, ...) are published manually via
# the `codio-publish-level` workflow, so a broken subset mapping can't block
# merges to main.
#
# Docs: https://docs.codio.com/develop/develop/ide/tools/ghapi.html
#
# 404 from Codio usually means the assignment ID is wrong or the assignment
# has never been published. Publish it manually once in Codio, then retry.

name: codio-publish

on:
  push:
    branches:
      - main

jobs:
  publish-to-codio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Strip author-only material from the runner tree before any Codio
      # publish step runs, so none of these files can leak into any
      # assignment workspace. See _dev/README.md for what lives there and why.
      - name: Strip _dev/ (teacher-only content) from publish tree
        run: rm -rf _dev

      # Course ID is shared across every assignment in this repo.
      # Per-assignment IDs below / in .github/yaml_map/*.yml.

      - name: Publish whole-course assignment (Minimal_Banking_Bot)
        uses: codio/codio-assignment-publish-action@master
        with:
          client-id: ${{ secrets.CODIO_PRODUCTION_CLIENT_ID }}
          secret-id: ${{ secrets.CODIO_PRODUCTION_SECRET_ID }}
          dir: ./
          course-id: aa4e8b53acdf01910c922abe1cc3a79f
          assignment-id: a5f4cb7c5fc7e8a37afb029730d1ae48
          changelog: ${{ github.event.head_commit.message }}
          # Set repo variable CODIO_DOMAIN to codio.co.uk if you use the UK site; otherwise codio.com
          domain: ${{ vars.CODIO_DOMAIN || 'codio.com' }}
