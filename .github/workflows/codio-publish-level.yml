name: codio-publish-level

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Which subset assignment to publish (level1..level6, or all)"
        required: true
        default: "level1"
      changelog:
        description: "Optional changelog message"
        required: false
        default: ""

jobs:
  publish-level-to-codio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Strip _dev/ (teacher-only content) from publish tree
        run: rm -rf _dev

      - name: Prepare yaml_map
        shell: bash
        run: |
          set -euo pipefail

          LEVEL_INPUT="${{ inputs.level }}"
          TMP_DIR=".github/yaml_map_dispatch"

          rm -rf "${TMP_DIR}"

          if [ "${LEVEL_INPUT}" = "all" ]; then
            mkdir -p "${TMP_DIR}"
            cp .github/yaml_map/*.yml "${TMP_DIR}/"
            echo "Prepared yaml_map: all levels"
            exit 0
          fi

          if [ ! -f ".github/yaml_map/${LEVEL_INPUT}.yml" ]; then
            echo "Unknown level input: ${LEVEL_INPUT}"
            echo "Expected one of: level1, level2, level3, level4, level5, level6, all"
            exit 1
          fi

          mkdir -p "${TMP_DIR}"
          cp ".github/yaml_map/${LEVEL_INPUT}.yml" "${TMP_DIR}/${LEVEL_INPUT}.yml"
          echo "Prepared yaml_map: ${LEVEL_INPUT}"

      - name: Publish subset assignment
        uses: codio/codio-assignment-publish-action@master
        with:
          client-id: ${{ secrets.CODIO_PRODUCTION_CLIENT_ID }}
          secret-id: ${{ secrets.CODIO_PRODUCTION_SECRET_ID }}
          dir: ./
          course-id: aa4e8b53acdf01910c922abe1cc3a79f
          yml: ./.github/yaml_map_dispatch
          changelog: ${{ inputs.changelog || github.sha }}
          domain: ${{ vars.CODIO_DOMAIN || 'codio.com' }}

