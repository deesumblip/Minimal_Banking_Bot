# Level 4 Lab 4.1 targets transfer_money.yml; check_balance often stays as in Level 3/early 4.
# This collect description is richer than a one-line hint in the level4 starter tree so CALM can
# take the account from the same user turn as starting the flow (same spirit as Lab 4.1 collect text).

flows:
  check_balance:
    name: check a balance (demo)
    description: |
      Demonstrates a flow with slot collection.
      The agent will ask for an account number if not provided,
      then call the action to check the balance.
    steps:
      - collect: account
        description: |
          Bank account number or ID for this balance check.
          Extract the value from this message if the user already gave it in the same turn
          (for example starting the flow with "check balance for account 12345");
          otherwise accept their next short reply (digits or label).
      - action: action_check_balance_simple
