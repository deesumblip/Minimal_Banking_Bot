## Level 5 starter: Level 4 completion (before Level 5 labs)
#
# Same banking agent as the end of Level 4: transfer slots, flows, and actions.
# Level 5 labs add: tools/, tools: in endpoints.yml, transfer_money_tools flow,
# action_process_transfer_with_tools, and domain updates for transfer_money_tools.
#
# --- vs. the minimal Level 4 Lab 2.1 paste ---
#
# Slots: Lab 2.1 adds amount / recipient / account_from as plain type: text. This file adds
# from_llm + active_flow so FillSlot updates apply while the matching flow runs (check_balance
# vs transfer_money). Level 5 Lab 4.1 extends the same slots for transfer_money_tools.
#
# utter_ask_* (transfer): Lab 2.1 / solution reference prefer rephrase: False on the three
# transfer asks to reduce NLG/slot bugs. This baseline uses rephrase: True for consistency with
# other responses; switch those three to False if collection misbehaves (Level 4 Unit 0.2).
#
# actions: Short lab examples list only custom actions. Rasa requires every flow step name,
# including utter_*, to appear under actions: (validation / training).

version: "3.1"

slots:
  account:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: check_balance

  amount:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

  recipient:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

  account_from:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

  utter_ask_amount:
    - text: "How much would you like to transfer?"
      metadata:
        rephrase: True

  utter_ask_recipient:
    - text: "Who would you like to transfer money to?"
      metadata:
        rephrase: True

  utter_ask_account_from:
    - text: "Which account would you like to transfer from?"
      metadata:
        rephrase: True

# Every name used as `action:` in flows (including utter_* responses) must appear here.
actions:
  - utter_greet
  - utter_help
  - utter_contact
  - utter_goodbye
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
  - action_process_transfer
