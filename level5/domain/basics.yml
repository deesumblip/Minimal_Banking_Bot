## Level 5 starter: Chapter 1.4 completion (before Chapter 1.5 labs)
#
# Same banking agent as the end of Chapter 1.4: transfer slots, flows, and actions.
# Chapter 1.5 labs add: tools/, tools: in endpoints.yml, transfer_money_tools flow,
# action_process_transfer_with_tools, and domain updates for transfer_money_tools.

version: "3.1"

slots:
  account:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: check_balance

  amount:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

  recipient:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

  account_from:
    type: text
    mappings:
      - type: from_llm
        conditions:
          - active_flow: transfer_money

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

  utter_ask_amount:
    - text: "How much would you like to transfer?"
      metadata:
        rephrase: True

  utter_ask_recipient:
    - text: "Who would you like to transfer money to?"
      metadata:
        rephrase: True

  utter_ask_account_from:
    - text: "Which account would you like to transfer from?"
      metadata:
        rephrase: True

# Every name used as `action:` in flows (including utter_* responses) must appear here.
actions:
  - utter_greet
  - utter_help
  - utter_contact
  - utter_goodbye
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
  - action_process_transfer
