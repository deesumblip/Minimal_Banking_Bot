## Level 5 baseline: Chapter 1.4 completion + Chapter 1.5 (Tool Calling) work
#
# Domain matches the **final Chapter 1.4 banking agent** (transfer slots, asks, and actions),
# with Level 5 additions (e.g. `action_process_transfer_with_tools` when you complete Lab 4.1).
# Keep Level 1–4 responses and actions (including `action_holiday_hours`) so flows stay valid.

version: "3.1"

slots:
  account:
    type: text
  
  amount:
    type: text
  
  recipient:
    type: text
  
  account_from:
    type: text

responses:
  utter_greet:
    - text: "Hi! I'm a banking assistant. How can I help you today?"
      metadata:
        rephrase: True

  utter_help:
    - text: |
        I can help you with:
        - Checking your balance
        - Transferring money
        - Bank hours
        - Contact information
      metadata:
        rephrase: True

  utter_contact:
    - text: "You can reach us at support@bank.com or call 1-800-BANK-123."
      metadata:
        rephrase: True

  utter_goodbye:
    - text: "Goodbye! Have a great day!"
      metadata:
        rephrase: True

  utter_ask_account:
    - text: "What is your account number?"
      metadata:
        rephrase: True

  utter_ask_amount:
    - text: "How much would you like to transfer?"
      metadata:
        rephrase: True

  utter_ask_recipient:
    - text: "Who would you like to transfer money to?"
      metadata:
        rephrase: True

  utter_ask_account_from:
    - text: "Which account would you like to transfer from?"
      metadata:
        rephrase: True

actions:
  - action_bank_hours
  - action_holiday_hours
  - action_check_balance_simple
  - action_process_transfer
  - action_process_transfer_with_tools
