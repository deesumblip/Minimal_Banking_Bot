action_endpoint:
  actions_module: "actions"

nlg:
  type: rephrase
  llm:
    model_group: openai-gpt-5-1

# Tool functions live in `tools/`; add `mcp_servers:` below when you connect a banking MCP server (name and URL must match your running process).
# Example:
# mcp_servers:
#   - name: banking_mcp
#     url: http://127.0.0.1:8080/mcp
#     type: http
# From `level6/`, you can start the sample server with: python mcp_server/banking.py

tools:
  tools_module: "tools"

# Command and NLG models (Rasa tutorial host; use your Rasa license).
# https://rasa.com/docs/rasa-pro/concepts/components/llm-configuration/
model_groups:
  - id: openai-gpt-5-1
    models:
      - provider: rasa
        model: rasa/command-generator-llama-3.1-8b-instruct
        api_base: "https://tutorial-llm.rasa.ai"
        temperature: 0.1
